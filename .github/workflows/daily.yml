name: 每日文献推送

permissions:
  contents: write

on:
  schedule:
    # UTC 02:00 = 北京时间 10:00
    - cron: '0 2 * * *'
  workflow_dispatch:
    # 支持手动触发测试

jobs:
  daily-paper-push:
    name: 抓取 → 翻译 → 生成 → 发送
    runs-on: ubuntu-latest

    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: deepseek-chat
      QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
      QQ_EMAIL_AUTH_CODE: ${{ secrets.QQ_EMAIL_AUTH_CODE }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行全流程
        run: python run_all.py

      - name: Persist delivered-paper history
        run: |
          git config user.name "paper-seaching-bot"
          git config user.email "41898282+paper-seaching-bot@users.noreply.github.com"
          git add data/paper_history.json
          git diff --cached --quiet || git commit -m "chore(history): record delivered papers"
          git push
